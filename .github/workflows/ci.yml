name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: vault
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run Linter
        run: |
          ruff check .
      - name: Run Formatter
        run: |
          ruff format --check .
      - name: Run Units
        working-directory: vault
        run: |
          pytest backend/tests/ pipeline/tests/ --ignore=pipeline/tests/integration