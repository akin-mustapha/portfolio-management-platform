name: asset-monitoring-system
prefect-version: 3.6.15

build: null
push: null

pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /Users/kunmi/Projects/workspace/data_engineering/asset_monitoring_system

deployments:

  - name: t212_bronze
    entrypoint: src/orchestration/prefect/flow_t212_bronze.py:flow_t212_bronze
